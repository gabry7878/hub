<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Stuporeh Cloud - Hub</title><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');:root{color-scheme:dark;--bg:#07080c;--panel:rgba(14,18,27,0.82);--panel-strong:rgba(255,255,255,0.08);--line:rgba(255,255,255,0.12);--text:#f7f8fb;--muted:#a6afc0;--teal:#37d5c8;--amber:#f2b35b;--rose:#ec6f90;--shadow:0 24px 80px rgba(0,0,0,0.46)}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow-x:hidden;position:relative;padding:32px 18px}.page-backdrop{position:fixed;inset:0;width:100%;height:100%;z-index:-1;background:linear-gradient(135deg,rgba(55,213,200,0.18),transparent 32%),linear-gradient(315deg,rgba(236,111,144,0.18),transparent 34%),#07080c;overflow:hidden}.page-backdrop::before,.page-backdrop::after{content:"";position:absolute;inset:0}.page-backdrop::before{background-image:linear-gradient(rgba(255,255,255,0.035)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.035)1px,transparent 1px);background-size:46px 46px;mask-image:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent 82%)}.page-backdrop::after{background:radial-gradient(circle at 50% 18%,rgba(255,255,255,0.13),transparent 24%),linear-gradient(to bottom,transparent,rgba(7,8,12,0.78))}.hub-container{width:min(100%,470px);z-index:1}.hub-card{position:relative;overflow:hidden;padding:34px;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}.hub-card::before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,rgba(255,255,255,0.13),transparent 36%);pointer-events:none}.brand-mark{position:relative;display:grid;place-items:center;width:58px;height:58px;margin:0 auto 18px;border-radius:8px;background:linear-gradient(135deg,rgba(55,213,200,0.24),rgba(242,179,91,0.16));border:1px solid rgba(255,255,255,0.16);color:var(--text);font-size:1.35rem;box-shadow:inset 0 1px 0 rgba(255,255,255,0.16)}.hub-eyebrow{position:relative;color:var(--teal);font-size:0.73rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:8px}.hub-title{position:relative;font-size:clamp(2rem,7vw,2.65rem);line-height:1;font-weight:700;letter-spacing:0;margin-bottom:12px}.hub-subtitle{position:relative;font-size:0.98rem;line-height:1.6;color:var(--muted);max-width:34ch;margin:0 auto 30px}.buttons-grid{position:relative;display:flex;flex-direction:column;gap:12px}.hub-btn{display:flex;justify-content:space-between;align-items:center;min-height:76px;padding:14px 16px;text-decoration:none;color:var(--text);border-radius:8px;border:1px solid var(--line);background:rgba(255,255,255,0.045);transition:transform 0.22s ease,border-color 0.22s ease,background 0.22s ease,box-shadow 0.22s ease}.btn-content{display:flex;align-items:center;gap:14px;min-width:0;text-align:left}.icon-shell{flex:0 0 auto;display:grid;place-items:center;width:42px;height:42px;border-radius:8px;background:var(--panel-strong);color:var(--text);font-size:1.05rem;border:1px solid rgba(255,255,255,0.1)}.btn-text{display:block;font-size:1.05rem;font-weight:700;letter-spacing:0}.btn-meta{display:block;margin-top:3px;color:var(--muted);font-size:0.82rem;line-height:1.35}.arrow-icon{flex:0 0 auto;font-size:0.85rem;color:rgba(255,255,255,0.42);transform:translateX(0);transition:transform 0.22s ease,color 0.22s ease}.hub-btn-bcso .icon-shell{color:var(--teal)}.hub-btn-bio .icon-shell{color:var(--amber)}.hub-btn-github .icon-shell{color:var(--rose)}.hub-btn:hover,.hub-btn:focus-visible{background:rgba(255,255,255,0.085);border-color:rgba(255,255,255,0.26);transform:translateY(-3px);box-shadow:0 14px 34px rgba(0,0,0,0.25);outline:none}.hub-btn:focus-visible{box-shadow:0 14px 34px rgba(0,0,0,0.25),0 0 0 3px rgba(55,213,200,0.28)}.hub-btn:hover .arrow-icon,.hub-btn:focus-visible .arrow-icon{color:var(--text);transform:translateX(5px)}.hub-btn:active{transform:translateY(0)}.watermark{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);font-size:0.75rem;color:rgba(255,255,255,0.42);letter-spacing:0.14em;text-transform:uppercase}@media(max-width:480px){body{align-items:flex-start;padding-top:28px}.hub-card{padding:26px 18px}.hub-title{font-size:2rem}.hub-btn{min-height:72px;padding:12px}.icon-shell{width:38px;height:38px}.btn-text{font-size:0.98rem}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{scroll-behavior:auto !important;transition-duration:0.01ms !important;animation-duration:0.01ms !important;animation-iteration-count:1 !important}}</style><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></head><body><div class="page-backdrop" aria-hidden="true"></div><main class="hub-container"><section class="hub-card" aria-labelledby="hub-title"><div class="brand-mark" aria-hidden="true"><i class="fa-solid fa-cloud"></i></div><p class="hub-eyebrow">Stuporeh Cloud</p><h1 class="hub-title" id="hub-title">Hub principale</h1><p class="hub-subtitle">Scegli una destinazione e continua verso il portale giusto.</p><div class="buttons-grid"><a href="https://bcso.stuporeh.cloud" class="hub-btn hub-btn-bcso"><div class="btn-content"><span class="icon-shell"><i class="fa-solid fa-server"></i></span><span><span class="btn-text">BCSO Portal</span><span class="btn-meta">Area operativa</span></span></div><i class="fa-solid fa-chevron-right arrow-icon"></i></a><a href="https://bio.stuporeh.cloud" class="hub-btn hub-btn-bio"><div class="btn-content"><span class="icon-shell"><i class="fa-solid fa-user"></i></span><span><span class="btn-text">Biografia personale</span><span class="btn-meta">Profilo e informazioni</span></span></div><i class="fa-solid fa-chevron-right arrow-icon"></i></a><a href="https://github.com/gabry7878" class="hub-btn hub-btn-github"><div class="btn-content"><span class="icon-shell"><i class="fa-brands fa-github"></i></span><span><span class="btn-text">GitHub</span><span class="btn-meta">Progetti e codice</span></span></div><i class="fa-solid fa-chevron-right arrow-icon"></i></a></div></section></main><div class="watermark">Made by Stuporeh</div></body></html>
