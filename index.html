<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stuporeh Cloud - Gateway</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="bg-gradient"></div>

    <main class="hub-container">
        <div class="hub-card glass-effect">
            <h1 class="hub-title">Stuporeh's Hub</h1>
            <p class="hub-subtitle">Select which WebSite to visit</p>

            <div class="buttons-grid">
                <a href="https://bcso.stuporeh.cloud" class="hub-btn glass-effect">
                    <div class="btn-content">
                        <i class="fa-solid fa-server btn-icon"></i>
                        <span class="btn-text">BCSO Portal</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>

                <a href="https://bio.stuporeh.cloud" class="hub-btn glass-effect">
                    <div class="btn-content">
                        <i class="fa-solid fa-user btn-icon"></i>
                        <span class="btn-text">Biografia personale</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>

                <a href="https://github.com/gabry7878" class="hub-btn glass-effect">
                    <div class="btn-content">
                        <i class="fa-brands fa-github"></i>
                        <span class="btn-text">GitHub</span>
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-icon"></i>
                </a>

            </div>
        </div>
    </main>

    <div class="watermark">Made by Stuporeh</div>

    <script src="script.js"></script>

</body>
</html>
